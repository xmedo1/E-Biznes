name: Build CI
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: cd Zadanie10/sklep-backend && CGO_ENABLED=1 go build -o server .
      - uses: actions/upload-artifact@v4
        with:
          name: zadanie10-backend
          path: Zadanie10/sklep-backend/server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd Zadanie10/sklep && npm install && npm run build
  sonar-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      # 
      - name: Sonar e-mail
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Wyniki analizy Sonar - ${{ github.repository }}
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions Bot
          body: |
            Analiza kodu w projekcie ${{ github.repository }} została zakończona.
            Status: ${{ job.status }}
