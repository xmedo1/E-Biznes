name: Build CI
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: cd Zadanie10/sklep-backend && CGO_ENABLED=1 go build -o server .
      - uses: actions/upload-artifact@v4
        with:
          name: zadanie10-backend
          path: Zadanie10/sklep-backend/server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd Zadanie10/sklep && npm install && npm run build